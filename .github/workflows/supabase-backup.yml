name: Supabase backup

# El plan gratis de Supabase NO incluye backups automaticos ni
# Point-in-Time Recovery (eso es de planes pagos). Si el proyecto se
# pausa por inactividad y despues se elimina (60 dias sin reactivar,
# segun aviso de Supabase), no hay forma de recuperar tablas, RPC ni
# datos salvo que exista un respaldo propio. Este workflow corre un
# pg_dump completo cada semana y lo deja como artifact privado del
# repo (solo visible para quienes tienen acceso al repo), listo para
# restaurar en otro proyecto de Supabase (o cualquier Postgres) si
# hiciera falta migrar.
#
# Este dump incluye schema y datos de PostgreSQL, incluida la metadata
# de Storage, pero NO descarga los archivos fisicos de los buckets.
# Logos, imagenes y comprobantes requieren un backup de Storage aparte.
#
# Requiere un secret de repo: SUPABASE_DB_PASSWORD
#   Debe contener solamente la password real de PostgreSQL, sin comillas,
#   corchetes ni codificacion para URI. Host, usuario, puerto y SSL se
#   configuran por separado para evitar errores con caracteres especiales.

on:
  schedule:
    - cron: "0 6 * * 0" # todos los domingos, 06:00 UTC
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar cliente de PostgreSQL 17
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl --fail --silent --show-error \
            --output /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          . /etc/os-release
          printf '%s\n' \
            'Types: deb' \
            'URIs: https://apt.postgresql.org/pub/repos/apt' \
            "Suites: ${VERSION_CODENAME}-pgdg" \
            'Components: main' \
            'Signed-By: /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc' \
            | sudo tee /etc/apt/sources.list.d/pgdg.sources > /dev/null
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Volcar la base completa (schema + datos)
        env:
          PGHOST: aws-1-ca-central-1.pooler.supabase.com
          PGPORT: "5432"
          PGDATABASE: postgres
          PGUSER: postgres.fbhccpvhbsbrdtxkliih
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PGSSLMODE: require
        run: |
          test -n "$PGPASSWORD" || {
            echo "Falta el secret SUPABASE_DB_PASSWORD."
            exit 1
          }
          fecha=$(date +%Y-%m-%d)
          /usr/lib/postgresql/17/bin/pg_dump \
            --no-owner \
            --no-privileges \
            --format=custom \
            --file="agendame-backup-${fecha}.dump"
          test -s "agendame-backup-${fecha}.dump"
          /usr/lib/postgresql/17/bin/pg_restore \
            --list "agendame-backup-${fecha}.dump" > /dev/null

      - name: Subir el backup como artifact privado
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_id }}
          path: agendame-backup-*.dump
          retention-days: 90
