<svg xmlns="http://www.w3.org/2000/svg" width="900" height="260" viewBox="0 0 900 260" fill="none" role="img" aria-label="AgendaMe logo">
  <defs>
    <linearGradient id="calStroke" x1="55" y1="28" x2="235" y2="216" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="0.55" stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="checkGrad" x1="98" y1="142" x2="256" y2="82" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10B981"/>
      <stop offset="0.55" stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="meGrad" x1="695" y1="82" x2="835" y2="155" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.16"/>
    </filter>
    <filter id="miniShadow" x="-20%" y="-20%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <!-- Calendar body -->
    <rect x="52" y="44" width="178" height="166" rx="36" fill="#F8FAFC" stroke="url(#calStroke)" stroke-width="14"/>
    <path d="M80 44H202C217.464 44 230 56.536 230 72V92H52V72C52 56.536 64.536 44 80 44Z" fill="url(#calStroke)"/>
    <!-- Binder rings -->
    <rect x="88" y="20" width="20" height="58" rx="10" fill="#0F172A"/>
    <rect x="174" y="20" width="20" height="58" rx="10" fill="#0F172A"/>
    <rect x="94" y="26" width="8" height="40" rx="4" fill="#DDF6FF" opacity="0.78"/>
    <rect x="180" y="26" width="8" height="40" rx="4" fill="#DDF6FF" opacity="0.78"/>

    <!-- Grid -->
    <rect x="82" y="112" width="30" height="30" rx="8" fill="#EAF4FF"/>
    <rect x="122" y="112" width="30" height="30" rx="8" fill="#EAF4FF"/>
    <rect x="162" y="112" width="30" height="30" rx="8" fill="#EAF4FF"/>
    <rect x="82" y="154" width="30" height="30" rx="8" fill="#EAF4FF"/>
    <rect x="122" y="154" width="30" height="30" rx="8" fill="#EAF4FF"/>
    <rect x="162" y="154" width="30" height="30" rx="8" fill="#EAF4FF"/>

    <!-- Check -->
    <path d="M98 143L136 180L248 78" stroke="url(#checkGrad)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Reminder bell badge -->
  <g filter="url(#miniShadow)">
    <circle cx="226" cy="55" r="27" fill="#14B8A6" stroke="#F8FAFC" stroke-width="6"/>
    <path d="M226 40C218.82 40 214 45.02 214 52.4V61.4L209.5 67H242.5L238 61.4V52.4C238 45.02 233.18 40 226 40Z" fill="#F8FAFC"/>
    <path d="M220 70C221.2 73 223.2 74.5 226 74.5C228.8 74.5 230.8 73 232 70" stroke="#F8FAFC" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="292" y="151" fill="#F8FAFC" font-size="88" font-family="Inter, Manrope, Avenir Next, Arial, sans-serif" font-weight="800" letter-spacing="-3">Agenda</text>
  <text x="642" y="151" fill="url(#meGrad)" font-size="88" font-family="Inter, Manrope, Avenir Next, Arial, sans-serif" font-weight="800" letter-spacing="-3">Me</text>
</svg>